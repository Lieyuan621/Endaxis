<!doctype html>
<html lang="" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endaxis - 《明日方舟：终末地》排轴工具</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #111113;
      }

      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(24, 24, 28, 0.92);
        color: #00e5ff;
        font-family:
          "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        letter-spacing: 1px;
      }

      .boot-loader .panel {
        position: relative;
        min-width: 280px;
        max-width: 520px;
        padding: 22px 26px;
        border: 1px solid rgba(255, 215, 0, 0.22);
        background: rgba(0, 0, 0, 0.25);
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        gap: 14px;
        overflow: hidden;
      }

      .boot-loader .scanner {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.8), transparent);
        animation: scan 1.4s ease-in-out infinite;
        opacity: 0.85;
      }

      .boot-loader .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(0, 229, 255, 0.25);
        border-top-color: #ffd700;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        flex: 0 0 auto;
      }

      .boot-loader .message {
        font-weight: 900;
        font-size: 13px;
        line-height: 1.3;
        color: #00e5ff;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes scan {
        0% {
          transform: translateX(-35%);
        }
        50% {
          transform: translateX(35%);
        }
        100% {
          transform: translateX(-35%);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-loader" role="status" aria-live="polite" aria-busy="true">
        <div class="panel">
          <div class="scanner" aria-hidden="true"></div>
          <div class="spinner" aria-hidden="true"></div>
          <div class="message">正在加载...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
